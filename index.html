<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Grid</title>
    <link rel="stylesheet" href="style.css/main.css">
</head>
<body>
    <div class="container">
        <div class="box yes1">
            <div class="bg-one"><span class="fed">Create and </span> schedule content <span class="hero">quicker</span></div>
            <figure class="lg-one" >
                <img src="assets/images/illustration-create-post.webp" alt="create post" width="382" height="182">
                <figcaption></figcaption>
            </figure>
        </div>
        <div class="box yes2">
            <div class="bg-two">Social media <span class="hero2">10x</span><em> Faster</em> with AI</div>
            <figure class="lg-two">
                <img src="assets/images/illustration-five-stars.webp" alt="socila media faster" width="384" height="64">
                <figcaption class="mase">Over 4,000 5-star reviews</figcaption>
            </figure>
        </div>
        <div class="box yes3">
            <div class="bg-three">Schedule to <span class="ball">social media</span></div>
            <div class="lg-three">
                <img src="assets/images/illustration-schedule-posts.webp" alt="scheldule post" width="715" height="638">
                     <figcaption class="book">  Optimize post timgs to publish content at the perfect time for your audience</figcaption>
            </div>            
        </div>
        <div class="box yes4">
            <div class="bg-four">Write your content <span class="caro">using AI</span></div>
            <figure class="lg-four">
                <img src="assets/images/illustration-ai-content.webp" alt="grow your audience" width="440" height="446">
                <figcaption></figcaption>
            </figure>
        </div>
        <div class="box yes5">
            <figure class="lg-five">
                <img src="assets/images/illustration-multiple-platforms.webp" alt="multiplr platforms" width="633" height="134">
            </figure>
            <div class="wrapper">
            <div class="bg-five">Manage multiple accounts and platforms</div>
            </div>
        </div>
        <div class="box yes6">
            <div class="bg-six">Maintaining a consistent posting schedule</div>
            <figure class="lg-six">
                <img src="assets/images/illustration-consistent-schedule.webp" alt="consistnet posting schedule" width="416" height="314">
            </figure>
        </div>
        <div class="box yes7">
          <div class="bg-seven"><span class="gucci">>56</div>
            <div class="fila">faster audience growth</div>
          <figure class="lg-seven">
            <img src="assets/images/illustration-audience-growth.webp" alt="audiencce growth" width="358" height="134">
          </figure>
        </div>
        <div class="box yes8">
            <figure class="lg-eight">
                <img src="assets/images/illustration-grow-followers.webp" alt="grow my followers" width="456" height="402">
                <figcaption></figcaption>                
            </figure>
            <div class="bg-eight"><span class="hot">Grow followers</span> <span class="cold">with non-stop</span> content</div>
        </div>
    </div>
    
</body>
</html>
